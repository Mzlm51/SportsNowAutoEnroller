<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Muay Thai Classes</title>

<link
  href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
  rel="stylesheet"
/>
<div style="text-align:center; margin-bottom:20px;">
  <label>
    <input type="checkbox" id="schedulerToggle" /> Enable auto-enrollment
  </label>
  <label>
    <input type="checkbox" id="scraperToggle" /> Enable auto-scraping
  </label>
</div>
<div id="calendar"></div>
<style>
  body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
  #calendar { max-width: 1100px; margin: 40px auto; }
</style>
</head>
<body>

<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>
async function loadClasses() {
  const res = await fetch("/classes");
  const classes = await res.json();

  const resEnroll = await fetch("/enroll_requests");
  const enrollments = await resEnroll.json();

  const resLog = await fetch("/enroll_log");
  const log = await resLog.json();

  return classes.map(cls => {
    const isPending = enrollments.some(e => e.href === cls.href && e.start.slice(0,10) === cls.start.slice(0,10));
    const logEntry = log.find(e => e.href === cls.href && e.start.slice(0,10) === cls.start.slice(0,10));
    const isConfirmed = !!logEntry;
    const isCancelled = logEntry && logEntry.cancelled;

    const color = isCancelled ? "red" : isConfirmed ? "green" : isPending ? "orange" : "";
    const prefix = isCancelled ? "✗ " : isConfirmed ? "✓ " : "";

    return {
      title: prefix + cls.class_title,
      start: cls.start,
      end: cls.end,
      extendedProps: {
        href: cls.href,
        day: cls.day,
        confirmed: isConfirmed,
        cancelled: isCancelled,
        rawTitle: cls.class_title
      },
      backgroundColor: color,
      borderColor: color
    };
  });
}


document.addEventListener("DOMContentLoaded", async function () {
  const events = await loadClasses();

  const calendar = new FullCalendar.Calendar(document.getElementById("calendar"), {
    initialView: "timeGridWeek",
    timeZone: "local",
    locale: "de",

    slotLabelFormat: { hour: "2-digit", minute: "2-digit", hour12: false },
    eventTimeFormat: { hour: "2-digit", minute: "2-digit", hour12: false },

    events: events,

    eventClick: function(info) {
      info.jsEvent.preventDefault();

      if (info.event.extendedProps.cancelled) {
        alert("This class has been cancelled.");
        return;
      }

      if (info.event.extendedProps.confirmed) {
        if (!confirm(`Unenroll from "${info.event.title.replace("✓ ", "")}"?`)) return;
        fetch("/unenroll_requests", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            title: info.event.extendedProps.rawTitle,
            start: info.event.start.toISOString()
          })
        }).then(res => {
          if (!res.ok) { alert("Error queuing unenrollment"); return; }
          info.event.setProp("title", info.event.extendedProps.rawTitle);
          info.event.setProp("backgroundColor", "");
          info.event.setProp("borderColor", "");
          info.event.setExtendedProp("confirmed", false);
          alert("Unenrollment queued — will be processed shortly.");
        });
        return;
      }

      const isEnrolled = info.event.backgroundColor === "orange";

      if (isEnrolled) {
        if (!confirm(`Unenroll from "${info.event.title}"?`)) return;

        fetch("/enroll_requests", {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            title: info.event.title,
            day: info.event.extendedProps.day
          })
        }).then(async res => {
          if (!res.ok) {
            alert("Error removing enrollment");
            return;
          }
          info.event.setProp("backgroundColor", "");
          info.event.setProp("borderColor", "");
          alert("Enrollment removed!");
        }).catch(err => {
          console.error(err);
          alert("Unexpected error");
        });

      } else {
        if (!confirm(`Enroll in "${info.event.title}"?`)) return;

        fetch("/enroll_requests", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            title: info.event.title,
            start: info.event.start.toISOString(),
            href: info.event.extendedProps.href,
            day: info.event.extendedProps.day
          })
        }).then(async res => {
          if (!res.ok) {
            const errorData = await res.json();
            alert(errorData.message);
            return;
          }
          info.event.setProp("backgroundColor", "orange");
          info.event.setProp("borderColor", "orange");
          alert("Enrollment scheduled!");
        }).catch(err => {
          console.error(err);
          alert("Unexpected error");
        });
      }
    }
  });

  calendar.render();
});
</script>

<script>
const toggle = document.getElementById("schedulerToggle");
const scraperToggle = document.getElementById("scraperToggle");

fetch("/scheduler_status")
  .then(res => res.json())
  .then(data => {
    toggle.checked = data.enabled;
    scraperToggle.checked = data.autoscrape_enabled;
  });
/*
  function updateToggles() {
  fetch("/scheduler_status", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      schedulerEnabled: schedulerToggle.checked,
      scraperEnabled: scraperToggle.checked
    })
  });
}
*/
toggle.addEventListener("change", () => {
  fetch("/scheduler_status", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ enabled: toggle.checked })
  });
});

scraperToggle.addEventListener("change", () => {
  fetch("/scheduler_status", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ autoscrape_enabled: scraperToggle.checked })
  });
});
</script>


</body>
</html>
